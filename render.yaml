services:
  - type: web
    name: telemed-hybrid-crypto
    runtime: python
    pythonVersion: "3.11"
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
    healthCheckPath: /login
